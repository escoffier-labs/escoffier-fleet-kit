name: ci

on:
  push:
    paths-ignore:
      - 'docs/**'
      - '*.md'
      - 'LICENSE'
      - '.gitignore'
    branches: [main]
  pull_request:
    paths-ignore:
      - 'docs/**'
      - '*.md'
      - 'LICENSE'
      - '.gitignore'

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: shellcheck shell scripts
        run: shellcheck bin/*.sh

      - name: node tests
        run: npm test

      - name: node --check each mjs
        run: |
          for f in bin/*.mjs og/*.mjs banner/*.mjs; do
            echo "checking $f"
            node --check "$f"
          done
